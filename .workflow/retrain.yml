name: Model Retraining and Deployment CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  retrain_and_push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas numpy scikit-learn dagshub

    - name: Run MLflow Project (Retrain Model)
      env:
        DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
        DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        if [ ! -z "$DAGSHUB_TOKEN" ]; then
          export MLFLOW_TRACKING_USERNAME=$DAGSHUB_OWNER
          export MLFLOW_TRACKING_PASSWORD=$DAGSHUB_TOKEN
          export MLFLOW_TRACKING_URI="https://dagshub.com/$DAGSHUB_OWNER/$DAGSHUB_REPO.mlruns"
        fi
        mlflow run MLProject --env-manager=local -P random_state=7 -P learning_rate=0.1

    - name: Set up Docker Buildx
      if: ${{ secrets.DOCKER_HUB_TOKEN != '' }}
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: ${{ secrets.DOCKER_HUB_TOKEN != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and Push Docker Image
      if: ${{ secrets.DOCKER_HUB_TOKEN != '' }}
      run: |
        # Build model docker image using mlflow models build-docker
        # and push it to Docker Hub
        mlflow models build-docker -m MLProject/model -n ${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-model:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-model:latest
